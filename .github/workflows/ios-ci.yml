# AMEN App — iOS CI/CD Pipeline
# Runs on every PR and push to main.
# Builds the app, runs tests, and optionally uploads to TestFlight.
#
# Required GitHub Secrets:
#   APPLE_ID             — Your Apple ID email
#   APPLE_APP_PASSWORD   — App-specific password from appleid.apple.com
#   MATCH_PASSWORD       — Fastlane Match encryption passphrase
#   MATCH_GIT_URL        — Private Match certificates repo URL
#   FIREBASE_TOKEN       — Firebase CLI token (firebase login:ci)
#   ADMIN_UIDS           — Comma-separated admin UIDs for Cloud Functions

name: iOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  XCODE_VERSION: "16.2"
  IOS_DEPLOYMENT_TARGET: "16.0"
  SCHEME: "AMENAPP"
  WORKSPACE: "AMENAPP.xcworkspace"
  BUNDLE_ID: "com.amenapp.ios"

jobs:
  # ─────────────────────────────────────────────────────
  # JOB 1: Build + Test
  # ─────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -workspace "${{ env.WORKSPACE }}" -scheme "${{ env.SCHEME }}"

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -workspace "${{ env.WORKSPACE }}" \
            -scheme "${{ env.SCHEME }}" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run tests
        run: |
          xcodebuild test-without-building \
            -workspace "${{ env.WORKSPACE }}" \
            -scheme "${{ env.SCHEME }}" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            | xcpretty

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult

  # ─────────────────────────────────────────────────────
  # JOB 2: Cloud Functions Tests
  # ─────────────────────────────────────────────────────
  functions-test:
    name: Cloud Functions Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Run tests
        run: npm test
        working-directory: functions

  # ─────────────────────────────────────────────────────
  # JOB 3: Deploy Cloud Functions (main branch only)
  # ─────────────────────────────────────────────────────
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    needs: [build-and-test, functions-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy functions
        run: firebase deploy --only functions --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
        env:
          ADMIN_UIDS: ${{ secrets.ADMIN_UIDS }}

  # ─────────────────────────────────────────────────────
  # JOB 4: Security Scanning
  # ─────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

      - name: Check for hardcoded API keys in Swift
        run: |
          # Fail if any Swift file contains what looks like a real API key
          if grep -rn --include="*.swift" \
            -E "(AIzaSy[A-Za-z0-9_-]{33}|sk-[A-Za-z0-9]{48}|AKIA[A-Z0-9]{16})" . ; then
            echo "❌ Hardcoded API key detected in Swift source!"
            exit 1
          fi
          echo "✅ No hardcoded API keys found"
