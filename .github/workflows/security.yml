name: Security Scan

on:
  push:
    branches: [ main, 'berean/**', 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  # ── 1. Dependency vulnerability scan (Node) ───────────────────────────────
  node-audit:
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        functions-dir: [ functions, Backend/functions ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.functions-dir }}/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.functions-dir }}
      - name: Run npm audit (fail on high/critical)
        run: npm audit --audit-level=high
        working-directory: ${{ matrix.functions-dir }}

  # ── 2. Secret scanning ────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for gitleaks
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # only needed for org repos; free for public/private

  # ── 3. App Check enforcement static test ─────────────────────────────────
  appcheck-enforcement:
    name: App Check Enforcement Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/functions/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: Backend/functions
      - name: Run App Check enforcement static test
        run: npx jest aiAppCheckEnforcement --testPathPattern=aiAppCheckEnforcement
        working-directory: Backend/functions

  # ── 4. Firestore rules tests ──────────────────────────────────────────────
  rules-test:
    name: Firestore Rules Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: functions
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Run Firestore rules tests
        run: npm run test:rules
        working-directory: functions
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
      # Note: Add firebase-tools emulator setup if needed for the rules test runner
