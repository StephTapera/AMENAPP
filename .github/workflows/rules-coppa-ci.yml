# GAP BOARD P0-9 (start): the Firestore security-rules emulator suite and the
# COPPA/PII function tests previously ran in NO CI job, so minor-safety, DM, and
# phone-PII regressions could merge ungated. This workflow runs them on every PR
# and push that touches rules, indexes, or the functions backend.
name: Rules & COPPA CI

on:
  pull_request:
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "functions/**"
      - "Backend/rules-tests/**"
      - ".github/workflows/rules-coppa-ci.yml"
  push:
    branches: [main, develop, integration]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "functions/**"
      - "Backend/rules-tests/**"

jobs:
  firestore-rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install rules-test deps
        working-directory: Backend/rules-tests
        run: npm ci
      - name: Run Firestore rules tests against the emulator
        working-directory: Backend/rules-tests
        # firebase emulators:exec boots the Firestore emulator (rules tests inject
        # the repo-root firestore.rules) and runs jest, then tears the emulator down.
        run: npx firebase emulators:exec --only firestore --project demo-amen "npm test"

  functions-coppa-pii-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install functions deps
        working-directory: functions
        run: npm ci
      - name: Run functions test suite (discussion + COPPA + phone-PII)
        working-directory: functions
        run: npm test
