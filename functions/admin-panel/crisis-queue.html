<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">AMEN Admin — Crisis Queue</title>
  <style>
    /* ── Reset / Base ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      font-size: 13px;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ── Login screen ───────────────────────────────────────────────── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 12px;
    }
    #login-screen h1 { font-size: 18px; color: #ff4444; margin-bottom: 8px; }
    #login-screen input {
      width: 280px;
      padding: 8px 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      border-radius: 4px;
      font-size: 13px;
    }
    #login-screen input:focus { outline: none; border-color: #ff4444; }
    #login-error { color: #ff6666; font-size: 12px; min-height: 16px; }

    /* ── Main layout ────────────────────────────────────────────────── */
    #app { display: none; flex-direction: column; height: 100vh; }
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      gap: 12px;
      flex-shrink: 0;
    }
    #header-left { display: flex; align-items: center; gap: 12px; }
    #header h1 { font-size: 15px; color: #e0e0e0; white-space: nowrap; }
    #badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 20px;
      padding: 0 6px;
      background: #cc0000;
      color: #fff;
      font-size: 11px;
      font-weight: bold;
      border-radius: 10px;
    }
    #badge.empty { background: #444; }
    #status-bar {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
    }
    #refresh-btn, #logout-btn {
      padding: 5px 12px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #ccc;
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
    }
    #refresh-btn:hover { border-color: #888; color: #fff; }
    #logout-btn:hover { border-color: #ff4444; color: #ff4444; }

    /* ── Table ──────────────────────────────────────────────────────── */
    #table-container {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      position: sticky;
      top: 0;
      background: #111;
      padding: 8px 10px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      border-bottom: 1px solid #2a2a2a;
      white-space: nowrap;
      z-index: 10;
    }
    tbody tr {
      border-bottom: 1px solid #1a1a1a;
      transition: background 0.1s;
    }
    tbody tr:hover { background: #161616; }
    tbody td {
      padding: 8px 10px;
      vertical-align: top;
    }

    /* ── Urgency color coding ───────────────────────────────────────── */
    tr.urgency-critical td:first-child { border-left: 3px solid #cc0000; }
    tr.urgency-high     td:first-child { border-left: 3px solid #cc7700; }
    tr.urgency-medium   td:first-child { border-left: 3px solid #ccaa00; }
    tr.urgency-low      td:first-child { border-left: 3px solid #4a6a4a; }

    .badge-critical { color: #ff4444; font-weight: bold; }
    .badge-high     { color: #ffaa44; font-weight: bold; }
    .badge-medium   { color: #ffdd44; }
    .badge-low      { color: #aaccaa; }

    .uid-partial  { font-family: monospace; font-size: 12px; color: #aaa; }
    .snippet      { color: #ccc; max-width: 320px; word-break: break-word; }
    .snippet.none { color: #555; font-style: italic; }
    .surface-tag  {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
      background: #2a2a2a;
      color: #aaa;
    }
    .crisis-types { font-size: 11px; color: #999; }

    /* ── Actions cell ───────────────────────────────────────────────── */
    .actions-cell { white-space: nowrap; }
    .resolve-select {
      padding: 4px 6px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #ccc;
      border-radius: 3px;
      font-size: 11px;
      cursor: pointer;
      max-width: 180px;
    }
    .resolve-btn {
      margin-left: 4px;
      padding: 4px 10px;
      background: #1a2a1a;
      border: 1px solid #3a5a3a;
      color: #8acd8a;
      border-radius: 3px;
      font-size: 11px;
      cursor: pointer;
    }
    .resolve-btn:hover { background: #2a4a2a; }
    .resolve-btn:disabled { opacity: 0.4; cursor: default; }
    .resolved-label { color: #4a8a4a; font-size: 11px; }

    /* ── Empty / loading states ─────────────────────────────────────── */
    #empty-state, #loading-state {
      padding: 48px;
      text-align: center;
      color: #555;
    }
    #loading-state { color: #666; }
    #error-banner {
      display: none;
      padding: 10px 16px;
      background: #2a0000;
      color: #ff8888;
      font-size: 12px;
      border-bottom: 1px solid #4a0000;
      flex-shrink: 0;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #444;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── Login Screen ──────────────────────────────────────────────────────── -->
<div id="login-screen">
  <h1>AMEN Admin — Crisis Queue</h1>
  <input type="email"    id="email"    placeholder="Admin email" autocomplete="email">
  <input type="password" id="password" placeholder="Password"    autocomplete="current-password">
  <button id="login-btn" style="width:280px;padding:8px 12px;background:#cc0000;border:none;color:#fff;border-radius:4px;cursor:pointer;font-size:13px;">
    Sign In
  </button>
  <div id="login-error"></div>
  <p style="color:#555;font-size:11px;margin-top:8px;">Admin/moderator account required.</p>
</div>

<!-- ── Main App ──────────────────────────────────────────────────────────── -->
<div id="app">
  <div id="header">
    <div id="header-left">
      <h1>Crisis Alert Queue</h1>
      <span id="badge" class="empty">0</span>
    </div>
    <span id="status-bar">Not loaded</span>
    <div style="display:flex;gap:8px;">
      <button id="refresh-btn">Refresh</button>
      <button id="logout-btn">Sign Out</button>
    </div>
  </div>

  <div id="error-banner"></div>

  <div id="table-container">
    <div id="loading-state"><span class="spinner"></span>Loading crisis alerts...</div>

    <table id="alert-table" style="display:none;">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>User (last 8)</th>
          <th>Snippet</th>
          <th>Urgency</th>
          <th>Surface</th>
          <th>Crisis Types</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="alert-tbody"></tbody>
    </table>

    <div id="empty-state" style="display:none;">No active crisis alerts. All clear.</div>
  </div>
</div>

<!-- ── Firebase JS SDK (CDN) ─────────────────────────────────────────────── -->
<script type="module">
  import { initializeApp }       from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFunctions, httpsCallable }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-functions.js';

  // ── Firebase config ────────────────────────────────────────────────────────
  // Project: amen-5e359  |  Region: us-central1
  const firebaseConfig = {
    apiKey:            'AIzaSyBRg7axwpIAxoKjuSuCBSqCtMuxfkqfE-k',
    authDomain:        'amen-5e359.firebaseapp.com',
    projectId:         'amen-5e359',
    storageBucket:     'amen-5e359.firebasestorage.app',
    messagingSenderId: '78278013543',
    appId:             '1:78278013543:ios:248f404eb1ec902f545ac2',
    databaseURL:       'https://amen-5e359-default-rtdb.firebaseio.com',
  };

  const app   = initializeApp(firebaseConfig);
  const auth  = getAuth(app);
  const fns   = getFunctions(app, 'us-central1');

  const getCrisisAlertQueue = httpsCallable(fns, 'getCrisisAlertQueue');
  const resolveAlert        = httpsCallable(fns, 'resolveAlert');

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const loginScreen   = document.getElementById('login-screen');
  const appDiv        = document.getElementById('app');
  const emailInput    = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn      = document.getElementById('login-btn');
  const loginError    = document.getElementById('login-error');
  const badge         = document.getElementById('badge');
  const statusBar     = document.getElementById('status-bar');
  const refreshBtn    = document.getElementById('refresh-btn');
  const logoutBtn     = document.getElementById('logout-btn');
  const errorBanner   = document.getElementById('error-banner');
  const loadingState  = document.getElementById('loading-state');
  const alertTable    = document.getElementById('alert-table');
  const alertTbody    = document.getElementById('alert-tbody');
  const emptyState    = document.getElementById('empty-state');
  const pageTitle     = document.getElementById('page-title');

  // ── Polling interval (30s) ─────────────────────────────────────────────────
  let pollTimer = null;

  // ── Auth state ─────────────────────────────────────────────────────────────
  onAuthStateChanged(auth, user => {
    if (user) {
      loginScreen.style.display = 'none';
      appDiv.style.display      = 'flex';
      startPolling();
    } else {
      clearInterval(pollTimer);
      loginScreen.style.display = 'flex';
      appDiv.style.display      = 'none';
    }
  });

  // ── Login ──────────────────────────────────────────────────────────────────
  loginBtn.addEventListener('click', doLogin);
  passwordInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    loginError.textContent = '';
    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in...';
    try {
      await signInWithEmailAndPassword(auth, emailInput.value.trim(), passwordInput.value);
    } catch (err) {
      loginError.textContent = friendlyAuthError(err.code);
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign In';
    }
  }

  function friendlyAuthError(code) {
    const MAP = {
      'auth/invalid-email':       'Invalid email address.',
      'auth/user-not-found':      'No account found.',
      'auth/wrong-password':      'Incorrect password.',
      'auth/too-many-requests':   'Too many attempts. Wait a moment.',
      'auth/invalid-credential':  'Invalid credentials.',
    };
    return MAP[code] ?? `Sign-in error: ${code}`;
  }

  // ── Logout ─────────────────────────────────────────────────────────────────
  logoutBtn.addEventListener('click', () => signOut(auth));

  // ── Polling ────────────────────────────────────────────────────────────────
  function startPolling() {
    loadAlerts();
    clearInterval(pollTimer);
    pollTimer = setInterval(loadAlerts, 30_000);
  }

  refreshBtn.addEventListener('click', () => {
    statusBar.textContent = 'Refreshing...';
    loadAlerts();
  });

  // ── Load alerts ────────────────────────────────────────────────────────────
  async function loadAlerts() {
    hideError();
    try {
      const result = await getCrisisAlertQueue({ limit: 100 });
      const data   = result.data;
      renderAlerts(data.alerts ?? []);
      const now = new Date().toLocaleTimeString();
      statusBar.textContent = `Last updated: ${now}`;
    } catch (err) {
      showError(`Failed to load: ${err.message}`);
      statusBar.textContent = 'Load failed — will retry in 30s';
    }
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function renderAlerts(alerts) {
    const count = alerts.length;

    // Update badge + title
    badge.textContent = count;
    badge.className   = count > 0 ? '' : 'empty';
    pageTitle.textContent = count > 0
      ? `(${count}) AMEN Admin — Crisis Queue`
      : 'AMEN Admin — Crisis Queue';

    if (count === 0) {
      alertTable.style.display = 'none';
      emptyState.style.display  = 'block';
      loadingState.style.display = 'none';
      return;
    }

    loadingState.style.display  = 'none';
    emptyState.style.display    = 'none';
    alertTable.style.display    = 'table';

    alertTbody.innerHTML = '';
    for (const alert of alerts) {
      const tr = document.createElement('tr');
      tr.className = `urgency-${alert.urgencyLevel ?? 'low'}`;
      tr.dataset.id     = alert.id;
      tr.dataset.source = alert.source ?? 'moderatorAlerts';

      tr.innerHTML = `
        <td>${formatTs(alert.createdAt)}</td>
        <td class="uid-partial">${partialUid(alert.userId)}</td>
        <td>${snippetCell(alert.contentSnippet)}</td>
        <td class="badge-${alert.urgencyLevel ?? 'low'}">${(alert.urgencyLevel ?? 'low').toUpperCase()}</td>
        <td><span class="surface-tag">${escHtml(alert.surface ?? 'unknown')}</span></td>
        <td class="crisis-types">${formatCrisisTypes(alert.crisisTypes)}</td>
        <td class="actions-cell">${actionsHtml(alert)}</td>
      `;
      alertTbody.appendChild(tr);
    }

    // Wire up resolve buttons
    alertTbody.querySelectorAll('.resolve-btn').forEach(btn => {
      btn.addEventListener('click', () => handleResolve(btn));
    });
  }

  function formatTs(ms) {
    if (!ms) return '<span style="color:#555">—</span>';
    const d = new Date(ms);
    return `<span title="${d.toISOString()}">${d.toLocaleDateString()} ${d.toLocaleTimeString()}</span>`;
  }

  function partialUid(uid) {
    if (!uid) return '<span style="color:#555">unknown</span>';
    return escHtml('...' + uid.slice(-8));
  }

  function snippetCell(snippet) {
    if (!snippet) return '<span class="snippet none">[no snippet]</span>';
    const safe = escHtml(snippet.slice(0, 100));
    return `<span class="snippet">${safe}${snippet.length > 100 ? '…' : ''}</span>`;
  }

  function formatCrisisTypes(types) {
    if (!types || types.length === 0) return '<span style="color:#555">—</span>';
    return types.map(t => escHtml(t)).join(', ');
  }

  function actionsHtml(alert) {
    return `
      <select class="resolve-select" data-id="${escHtml(alert.id)}" data-source="${escHtml(alert.source ?? 'moderatorAlerts')}">
        <option value="">— Select resolution —</option>
        <option value="safe">Safe — no action needed</option>
        <option value="contacted_user">Contacted user</option>
        <option value="escalated_to_counselor">Escalated to counselor</option>
        <option value="false_positive">False positive</option>
        <option value="referred_988">Referred to 988 / emergency services</option>
      </select>
      <button class="resolve-btn" data-id="${escHtml(alert.id)}" data-source="${escHtml(alert.source ?? 'moderatorAlerts')}" disabled>
        Resolve
      </button>
    `;
  }

  // Enable Resolve button only when a resolution is selected
  alertTbody.addEventListener('change', e => {
    if (e.target.classList.contains('resolve-select')) {
      const sel = e.target;
      const btn = sel.closest('td').querySelector('.resolve-btn');
      if (btn) btn.disabled = !sel.value;
    }
  });

  async function handleResolve(btn) {
    const td        = btn.closest('td');
    const sel       = td.querySelector('.resolve-select');
    const alertId   = btn.dataset.id;
    const source    = btn.dataset.source;
    const resolution = sel ? sel.value : '';

    if (!resolution) return;

    btn.disabled        = true;
    btn.textContent     = 'Resolving…';
    sel.disabled        = true;

    try {
      await resolveAlert({ alertId, source, resolution });
      // Remove row from table
      const tr = btn.closest('tr');
      tr.style.transition = 'opacity 0.3s';
      tr.style.opacity    = '0';
      setTimeout(() => {
        tr.remove();
        updateBadgeFromTable();
      }, 320);
    } catch (err) {
      showError(`Resolve failed for ${alertId}: ${err.message}`);
      btn.disabled    = false;
      btn.textContent = 'Resolve';
      if (sel) sel.disabled = false;
    }
  }

  function updateBadgeFromTable() {
    const remaining = alertTbody.querySelectorAll('tr').length;
    badge.textContent = remaining;
    badge.className   = remaining > 0 ? '' : 'empty';
    pageTitle.textContent = remaining > 0
      ? `(${remaining}) AMEN Admin — Crisis Queue`
      : 'AMEN Admin — Crisis Queue';
    if (remaining === 0) {
      alertTable.style.display = 'none';
      emptyState.style.display  = 'block';
    }
  }

  // ── Error banner ───────────────────────────────────────────────────────────
  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.style.display = 'block';
  }
  function hideError() {
    errorBanner.style.display = 'none';
  }

  // ── Utility ────────────────────────────────────────────────────────────────
  function escHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
